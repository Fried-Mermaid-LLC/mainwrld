name: Deploy to Firebase Hosting

# Builds the Vite app (output: dist/) and deploys it to Firebase Hosting on
# push to main. Replaces the GitHub Pages deployment.
#
# Requires repo secret FIREBASE_SERVICE_ACCOUNT: a Firebase service-account
# JSON with the "Firebase Hosting Admin" role (Firebase Console -> Project
# Settings -> Service accounts -> Generate new private key).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # FirebaseExtended/action-hosting-deploy@v0 has no Node 24 release yet;
    # force it onto the Node 24 runtime (GitHub makes this the default anyway).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:web
        env:
          # Production web takes REAL payments — Stripe Connect runs in live mode.
          VITE_STRIPE_MODE: live
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          # Required by lib/firebase.ts (requireEnv) since the RTDB presence
          # work (X06). Without it the bundle throws at import and the web app
          # is a blank white screen.
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: mainwrld-f7acf
