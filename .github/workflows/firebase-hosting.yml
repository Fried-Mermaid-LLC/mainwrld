name: Deploy to Firebase Hosting

# Builds the Vite app (output: dist/) and deploys it to Firebase Hosting on
# push to main. Replaces the GitHub Pages deployment. The same run ALSO deploys
# the backend (Firestore/RTDB/Storage rules + Cloud Functions) so the rules and
# functions can never silently drift behind the already-deployed front-end —
# the exact failure that left the schema-2 `books/{id}/chapters` rules and the
# RTDB presence rules un-deployed (drafts + presence hit default-deny in prod).
#
# Requires repo secret FIREBASE_SERVICE_ACCOUNT: a Firebase service-account
# JSON (Firebase Console -> Project Settings -> Service accounts -> Generate new
# private key). For the backend step the service account needs MORE than
# "Firebase Hosting Admin" — grant in GCP IAM (Console -> IAM):
#   - Firebase Rules Admin            (firestore.rules + storage.rules)
#   - Firebase Realtime Database Admin (database.rules.json)
#   - Storage Admin                    (storage.rules release)
#   - Cloud Functions Admin + Service Account User + Cloud Build Editor
#     + Artifact Registry Writer + Secret Manager Secret Accessor (functions)
# Until those roles are granted the backend step fails with 403 while hosting
# (the prior step) still deploys; in that interim drop `functions` from --only.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # FirebaseExtended/action-hosting-deploy@v0 has no Node 24 release yet;
    # force it onto the Node 24 runtime (GitHub makes this the default anyway).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:web
        env:
          # Production web takes REAL payments — Stripe Connect runs in live mode.
          VITE_STRIPE_MODE: live
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          # Required by lib/firebase.ts (requireEnv) since the RTDB presence
          # work (X06). Without it the bundle throws at import and the web app
          # is a blank white screen.
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: mainwrld-f7acf

      # Catch the backend up to the front-end in the same run. Runs AFTER
      # hosting, so a backend 403 (pending IAM, see header) never blocks the
      # hosting release. The SA JSON is passed via env (not inlined into the
      # script) so the secret can't leak through shell expansion. functions
      # build runs via firebase.json's predeploy hook, which needs functions/
      # deps installed first.
      - name: Deploy backend (rules + functions)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npm --prefix functions ci
          npx firebase-tools@15 deploy \
            --only firestore:rules,database,storage,functions \
            --project mainwrld-f7acf --non-interactive --force
