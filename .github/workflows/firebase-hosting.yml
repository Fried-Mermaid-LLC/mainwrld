name: Deploy to Firebase Hosting

# Builds the Vite app (output: dist/) and deploys it to Firebase Hosting on
# push to main. Replaces the GitHub Pages deployment. The same run ALSO deploys
# the backend (Firestore/RTDB/Storage rules + Cloud Functions) so the rules and
# functions can never silently drift behind the already-deployed front-end —
# the exact failure that left the schema-2 `books/{id}/chapters` rules and the
# RTDB presence rules un-deployed (drafts + presence hit default-deny in prod).
#
# Requires repo secret FIREBASE_SERVICE_ACCOUNT: a Firebase service-account JSON
# (Firebase Console -> Project Settings -> Service accounts -> Generate new
# private key) — the firebase-adminsdk-fbsvc@ account. The backend step needs
# MORE than "Firebase Hosting Admin"; the following IAM roles are GRANTED on the
# account and the Cloud Billing API is ENABLED, so the step deploys the full set
# (firestore:rules + database + storage + functions):
#   - Firebase Rules Admin             (firestore.rules + storage.rules release)
#   - Firebase Storage Admin           (firebasestorage.defaultBucket.get)
#   - Firebase Realtime Database Admin (database.rules.json)
#   - Storage Admin                    (GCS buckets)
#   - Cloud Functions Admin + Service Account User + Cloud Build Editor
#     + Artifact Registry Admin + Run Admin + Eventarc Admin + Pub/Sub Admin
#     + Cloud Scheduler Admin + Secret Manager Admin   (Gen2 functions)
#   - Cloud Billing API enabled on the project         (functions billing check)
# If a backend 403 returns, a role/API above was revoked — the hosting step runs
# first, so it still ships regardless.

on:
  push:
    branches: [main]
    paths:
      - "apps/app/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # FirebaseExtended/action-hosting-deploy@v0 has no Node 24 release yet;
    # force it onto the Node 24 runtime (GitHub makes this the default anyway).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Reads the pnpm version from the root package.json "packageManager" field.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build:web
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          # Required by lib/firebase.ts (requireEnv) since the RTDB presence
          # work (X06). Without it the bundle throws at import and the web app
          # is a blank white screen.
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          # Base URL of the NestJS API (Cloud Run / api.mainwrld.com). REQUIRED
          # by lib/apiClient.ts — without it the bundle throws at import and the
          # web app is a blank white screen (same failure class as the Firebase
          # vars above).
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: mainwrld-f7acf
          # Pin firebase-tools: 15.22.1/15.22.2 regressed service-account auth in
          # CI — the OAuth token fetch dies with "Invalid response body ...
          # /oauth2/v4/token: Premature close" -> "Failed to authenticate, have
          # you run firebase login?". 15.22.0 is the last version that works; the
          # action defaults firebaseToolsVersion to `latest` so it must be set.
          firebaseToolsVersion: "15.22.0"

      # Catch the backend up to the front-end in the same run so rules and
      # functions can never silently drift behind it. Runs AFTER hosting, so even
      # if a backend deploy ever errors the hosting release still ships. The SA
      # JSON is passed via env (not inlined into the script) so the secret can't
      # leak through shell expansion. functions build runs via firebase.json's
      # predeploy hook (`pnpm -C functions run build`); the root `pnpm install`
      # above already installed the functions workspace deps (incl. typescript),
      # and pnpm is on PATH via the Setup pnpm step, so no separate install is
      # needed here — `functions` is a pnpm workspace with no own lockfile.
      - name: Deploy backend (rules + functions)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx firebase-tools@15.22.0 deploy \
            --only firestore:rules,database,storage,functions \
            --project mainwrld-f7acf --non-interactive --force
