name: iOS TestFlight

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/workflows/firebase-hosting.yml'
  workflow_dispatch:

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 60

    env:
      TEAM_ID: 2C7AJQ5G4C
      BUNDLE_ID: com.mainwrld
      SCHEME: App
      PROJECT_PATH: ios/App/App.xcodeproj
      EXPORT_DIR: build/export
      ARCHIVE_PATH: build/App.xcarchive

    steps:
      - uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Build web
        run: npm run build:web
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Install App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" \
            | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      # Manual signing: import one fixed Apple Distribution certificate +
      # provisioning profile from secrets instead of letting Xcode mint a
      # new certificate every run (which exhausts Apple's certificate limit).
      - name: Import signing certificate & provisioning profile
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          set +e  # run diagnostics through to the explicit gate below
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          KEY_PEM="$RUNNER_TEMP/key.pem"
          CERT_PEM="$RUNNER_TEMP/cert.pem"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$DIST_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$PROVISION_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          echo "openssl: $(openssl version) | decoded .p12: $(wc -c < "$CERT_PATH") bytes"

          # Temporary keychain that will hold our distribution identity.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Primary path: import the .p12 directly. macOS natively reads the legacy
          # (RC2 / 3DES) PBE that Keychain Access exports.
          echo "--- direct security import ---"
          security import "$CERT_PATH" -P "$DIST_CERT_PASSWORD" -A -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign 2>&1 | sed 's/^/  /'

          # Fallback: if no identity formed (e.g. an OpenSSL-3 AES-encrypted .p12
          # that security can't decrypt), extract key + cert with openssl — legacy
          # provider enabled so it also reads RC2 — and import them as PEM.
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q 'Apple Distribution'; then
            echo "--- direct import yielded no identity; openssl PEM fallback ---"
            openssl pkcs12 -in "$CERT_PATH" -nodes -nocerts -passin pass:"$DIST_CERT_PASSWORD" -provider legacy -provider default -out "$KEY_PEM" 2>&1 | sed 's/^/  key:  /'
            openssl pkcs12 -in "$CERT_PATH" -nokeys -passin pass:"$DIST_CERT_PASSWORD" -provider legacy -provider default -out "$CERT_PEM" 2>&1 | sed 's/^/  cert: /'
            openssl rsa -in "$KEY_PEM" -out "$RUNNER_TEMP/key_trad.pem" 2>/dev/null && mv "$RUNNER_TEMP/key_trad.pem" "$KEY_PEM"
            security import "$CERT_PEM" -A -k "$KEYCHAIN_PATH" -T /usr/bin/codesign 2>&1 | sed 's/^/  /'
            security import "$KEY_PEM" -A -k "$KEYCHAIN_PATH" -T /usr/bin/codesign 2>&1 | sed 's/^/  /'
            rm -f "$KEY_PEM" "$CERT_PEM"
          fi

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null 2>&1
          echo "set-key-partition-list exit=$?"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)

          echo "=== codesigning identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          # Fail loudly here (not deep in xcodebuild) if no signing identity landed.
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q 'Apple Distribution'; then
            echo "::error::No Apple Distribution codesigning identity in keychain after import"
            exit 1
          fi
          set -e

          # Place the profile where Xcode expects to find it.
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

          # Profile name drives manual signing in the archive + export steps.
          PROFILE_NAME=$(security cms -D -i "$PP_PATH" | plutil -extract Name raw -)
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Using provisioning profile: $PROFILE_NAME"

      - name: Set build number
        working-directory: ios/App
        run: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          xcrun agvtool new-version -all "$BUILD_NUMBER"
          echo "Build number: $BUILD_NUMBER"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME"

      - name: Archive
        run: |
          mkdir -p build
          # Signing is configured on the App target in project.pbxproj (manual,
          # Apple Distribution, MainWRLD profile). Passing it on the command line
          # would apply globally and break SPM library targets that can't take a
          # provisioning profile (GoogleUtilities, Firebase, nanopb, ...).
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH"

      - name: Write ExportOptions.plist
        run: |
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Upload to TestFlight
        run: |
          IPA=$(find "$EXPORT_DIR" -name '*.ipa' -maxdepth 2 | head -1)
          if [ -z "$IPA" ]; then
            echo "::error::No IPA produced"
            exit 1
          fi
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Cleanup signing material
        if: always()
        run: |
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/build_pp.mobileprovision"
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

      - name: Upload archive artifact (debug)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xcarchive
          path: build/App.xcarchive
          retention-days: 3
