<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MainWRLD</title>
    <!-- Default Open Graph / Twitter card (F09). Per-book tags for shared
         `/book/<id>` links are server-rendered by the ogBook Cloud Function
         (link-preview crawlers don't execute the SPA's JS); these defaults
         cover the SPA root and any other path so something always unfurls. -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="MainWRLD">
    <meta property="og:title" content="MainWRLD">
    <meta property="og:description" content="Read and write stories on MainWRLD.">
    <meta property="og:image" content="https://mainwrld.com/logo.png">
    <meta name="twitter:card" content="summary_large_image">
    <!-- Self-hosted fonts (X02): no external Google Fonts / Material Icons CDN,
         so glyphs render reliably offline / on poor iOS connectivity. -->
    <link rel="preload" href="/fonts/inter-400-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/material-icons-round.woff2" as="font" type="font/woff2" crossorigin>
    <link href="/fonts/fonts.css" rel="stylesheet">
</head>
<body class="bg-white dark:bg-black transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
